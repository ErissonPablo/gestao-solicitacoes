# Copie para config/paths.yaml e ajuste.

# Fonte "Pasta local": a ferramenta le TODOS os .xls/.xlsx da pasta e
# identifica cada arquivo pelo conteudo (nao pelo nome). Pode apontar para
# uma pasta sincronizada do SharePoint (OneDrive) ou qualquer pasta de rede.
pasta_local: "C:\\Users\\erisson.sousa\\Downloads"

# Fonte "SharePoint": le os arquivos direto da pasta online.
sharepoint:
  site_url: "https://lactosulgo.sharepoint.com/sites/grp.compras"
  # caminho server-relative da pasta (a partir de /sites/...):
  pasta: "/sites/grp.compras/Documentos Compartilhados/1 - Planilhas diárias/1 - CONTROLE DE SOLICITAÇÃO DE COMPRAS"

